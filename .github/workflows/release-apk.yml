name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "refs/tags/${{ inputs.tag }}"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          prerelease=false
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "tag=$tag"
            echo "apk_name=scrollit-${tag}-debug.apk"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Build APK and run checks
        run: gradle --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/${{ steps.meta.outputs.apk_name }}"
          cat <<'EOF' > dist/release-notes.md
          First public GitHub APK build for ScrollIt.

          - APK: debug-signed build for manual installation
          - Install: download the APK from Assets and open it on your Android device
          - Channel: GitHub prerelease when the tag contains a suffix such as -beta.1
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          title="ScrollIt ${tag}"
          asset="dist/${{ steps.meta.outputs.apk_name }}"
          notes="dist/release-notes.md"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
            gh release edit "$tag" --title "$title" --notes-file "$notes"
            exit 0
          fi
          args=("$tag" "$asset" --title "$title" --notes-file "$notes")
          if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
